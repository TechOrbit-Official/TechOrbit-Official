<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - TechOrbit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .contact-section {
            padding: 120px 5% 80px;
            min-height: 100vh;
        }
        
        .contact-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        
        .contact-info {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
        }
        
        .contact-info h2 {
            color: var(--primary-color);
            margin-bottom: 2rem;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .info-item i {
            font-size: 1.5rem;
            color: var(--primary-color);
            width: 40px;
        }
        
        .info-item p {
            color: var(--text-gray);
        }
        
        .contact-form {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 5px;
            color: var(--text-light);
        }
        
        .map-container {
            margin-top: 3rem;
            border-radius: 10px;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="../images/logo.png" alt="TechOrbit Logo">
                <span>TechOrbit</span>
            </div>
            <div class="nav-links">
                <a href="../../index.html">الرئيسية</a>
                <a href="../../index.html#projects">المشاريع</a>
                <a href="about.html">من نحن</a>
                <a href="services.html">خدماتنا</a>
                <a href="contact.html" class="active">اتصل بنا</a>
            </div>
        </nav>
    </header>
    
    <section class="contact-section">
        <div class="contact-header" style="text-align: center; margin-bottom: 3rem;">
            <h1>اتصل <span class="highlight">بنا</span></h1>
            <p>نحن هنا للإجابة على استفساراتك</p>
        </div>
        
        <div class="contact-container">
            <div class="contact-info">
                <h2>معلومات الاتصال</h2>
                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <p>القاهرة، مصر</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <p>+20 123 456 7890</p>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <p>info@techorbit.com</p>
                </div>
                <div class="info-item">
                    <i class="fa-brands fa-github"></i>
                    <p>github.com/TechOrbit-Team</p>
                </div>
                
                <div class="social-links" style="margin-top: 2rem; justify-content: center;">
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                </div>
            </div>
            
            <form class="contact-form">
                <h2>أرسل لنا رسالة</h2>
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" required>
                </div>
                <div class="form-group">
                    <label>الموضوع</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>الرسالة</label>
                    <textarea rows="5" required></textarea>
                </div>
                <button type="submit" class="btn primary" style="width: 100%;">إرسال الرسالة</button>
            </form>
        </div>
        
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3452.3757893456789!2d31.2357!3d30.0444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzM5LjgiTiAzMcKwMTQnMDguNSJF!5e0!3m2!1sen!2seg!4v1234567890" 
                    width="100%" 
                    height="450" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy">
            </iframe>
        </div>
    </section>
    
    <footer>
        <!-- نفس تذييل الصفحة الرئيسية -->
    </footer>
    
    <script src="../main.js"></script>
</body>
</html>
